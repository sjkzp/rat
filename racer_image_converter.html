<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACER IMAGE CONVERTER</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f0e8;
  color: #3a2e1e;
  min-height: 100vh;
  padding: 24px;
}
h1 {
  font-size: 1.3rem;
  font-weight: 800;
  color: #8b4513;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 0.72rem;
  color: #a07850;
  margin-bottom: 22px;
}

/* ========== PC レイアウト（デフォルト）========== */
.upload-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}
.drop-zone {
  border: 2px dashed #c8a878;
  border-radius: 10px;
  padding: 14px 10px;
  text-align: center;
  background: #fffdf7;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.drop-zone:hover { border-color: #8b4513; background: #fff8ee; }
.drop-zone.dragover { border-color: #d46000; background: #fff3e0; }
.drop-zone.loaded { border-color: #5a8a3c; background: #f4fbed; }
.prev-canvas {
  max-width: 100%;
  max-height: 72px;
  image-rendering: pixelated;
  border: 1px solid #d0c0a0;
  background: repeating-conic-gradient(#ddd 0% 25%, #f0ece4 0% 50%) 0 0 / 8px 8px;
  border-radius: 4px;
}
.zone-info { width: 100%; }
.slot-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: #8b4513;
}
.slot-desc {
  font-size: 0.66rem;
  color: #b08060;
  line-height: 1.4;
}
.filename {
  font-size: 0.65rem;
  color: #5a8a3c;
  font-weight: 600;
  word-break: break-all;
}
.hint { font-size: 0.68rem; color: #b08060; }
.zone-click {
  position: absolute;
  inset: 0;
  cursor: pointer;
  opacity: 0;
}

.settings {
  background: #fffdf7;
  border: 1px solid #d0c0a0;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 22px;
  flex-wrap: wrap;
}
.setting-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.setting-row .label { font-size: 0.75rem; color: #6a5040; }
.setting-row input[type=range] { width: 90px; accent-color: #8b4513; }
.setting-row .val {
  font-size: 0.78rem;
  color: #8b4513;
  font-weight: 700;
  min-width: 38px;
}
.setting-row input[type=color] {
  width: 28px; height: 28px;
  border: 2px solid #c8a878;
  border-radius: 4px;
  cursor: pointer;
  padding: 1px;
  background: none;
}

.actions { display: flex; gap: 10px; margin-bottom: 18px; }
.btn {
  padding: 9px 22px;
  border: none;
  border-radius: 7px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:disabled { opacity: 0.35; cursor: default; }
.btn:not(:disabled):hover { opacity: 0.85; }
.btn:not(:disabled):active { transform: scale(0.97); }
.btn-convert { background: #c87820; color: #fff; }
.btn-dl      { background: #5a8a3c; color: #fff; }
.slot-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-bottom: 18px;
}
.btn-add-slot { background: #8b4513; color: #fff; }
.btn-remove-slot { background: #a07850; color: #fff; }

.preview-wrap {
  background: #fffdf7;
  border: 1px solid #d0c0a0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 20px;
}
.preview-wrap h2 { font-size: 0.8rem; color: #a07850; margin-bottom: 10px; }
#outputCanvas {
  display: block;
  max-width: 100%;
  image-rendering: pixelated;
  border: 1px solid #c8a878;
  background: repeating-conic-gradient(#ddd 0% 25%, #f0ece4 0% 50%) 0 0 / 10px 10px;
  border-radius: 4px;
}
.status { font-size: 0.72rem; margin-top: 8px; min-height: 1.1em; color: #c04000; }
.status.ok { color: #3a7a20; }
.rat-link { font-size: 0.75rem; color: #a07850; padding-bottom: 12px; }
.rat-link a { color: #8b4513; font-weight: 700; }

/* ========== スマホ レイアウト ========== */
@media (max-width: 600px) {
  body { padding: 14px; }

  .upload-list {
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .drop-zone {
    flex-direction: row;
    text-align: left;
    min-height: 68px;
    padding: 12px 14px;
    gap: 12px;
    justify-content: flex-start;
  }
  .prev-canvas {
    width: 72px !important;
    height: 48px !important;
    max-height: 48px;
    flex-shrink: 0;
  }
  .zone-info { flex: 1; min-width: 0; }
  .slot-desc { display: none; }
  .hint { display: none; }
  .filename { font-size: 0.68rem; margin-top: 3px; }

  .settings {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
    padding: 12px 14px;
  }
  .setting-row { gap: 10px; }
  .setting-row .label { width: 56px; flex-shrink: 0; }
  .setting-row input[type=range] { flex: 1; width: auto; height: 28px; }
  .setting-row input[type=color] { width: 44px; height: 36px; }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .slot-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    justify-content: stretch;
    gap: 10px;
  }
  .btn { padding: 14px 10px; font-size: 0.95rem; width: 100%; }
}
</style>
</head>
<body>

<h1>🏁 RACER IMAGE CONVERTER</h1>
<p class="subtitle">画像3枚 → 透過PNG スプライトシート生成</p>

<div class="upload-list">
  <div class="drop-zone" id="zone0">
    <canvas class="prev-canvas" id="prev0" width="140" height="60"></canvas>
    <div class="zone-info">
      <div class="slot-name">1枚目</div>
      <div class="slot-desc">① 左上 ＋ ② 右上に配置</div>
      <div class="filename" id="name0">クリック または ドロップ</div>
    </div>
    <input type="file" id="file0" accept=".bmp,image/*" style="display:none">
    <label class="zone-click" for="file0"></label>
  </div>
  <div class="drop-zone" id="zone1">
    <canvas class="prev-canvas" id="prev1" width="140" height="60"></canvas>
    <div class="zone-info">
      <div class="slot-name">2枚目</div>
      <div class="slot-desc">③ ②の直下に配置</div>
      <div class="filename" id="name1">クリック または ドロップ</div>
    </div>
    <input type="file" id="file1" accept=".bmp,image/*" style="display:none">
    <label class="zone-click" for="file1"></label>
  </div>
  <div class="drop-zone" id="zone2">
    <canvas class="prev-canvas" id="prev2" width="140" height="60"></canvas>
    <div class="zone-info">
      <div class="slot-name">3枚目</div>
      <div class="slot-desc">④ ③の直下に配置</div>
      <div class="filename" id="name2">クリック または ドロップ</div>
    </div>
    <input type="file" id="file2" accept=".bmp,image/*" style="display:none">
    <label class="zone-click" for="file2"></label>
  </div>
</div>

<div class="slot-actions">
  <button class="btn btn-add-slot" id="btnAddSlot" type="button">枠を増やす</button>
  <button class="btn btn-remove-slot" id="btnRemoveSlot" type="button" disabled>枠を減らす</button>
</div>

<div class="settings">
  <div class="setting-row">
    <span class="label">倍率</span>
    <input type="range" id="scale" min="10" max="50" value="10" step="1">
    <span class="val" id="scaleVal">×1.0</span>
  </div>
  <div class="setting-row">
    <span class="label">背景色</span>
    <input type="color" id="bgColor" value="#2b8585">
  </div>
  <div class="setting-row">
    <span class="label">許容誤差</span>
    <input type="range" id="tolerance" min="1" max="80" value="25">
    <span class="val" id="tolVal">25</span>
  </div>
</div>

<div class="actions">
  <button class="btn btn-convert" id="btnConvert" disabled>変換</button>
  <button class="btn btn-dl" id="btnDl" disabled>PNG保存</button>
</div>

<div class="preview-wrap">
  <h2 id="canvasInfo">出力プレビュー</h2>
  <canvas id="outputCanvas" width="400" height="200"></canvas>
  <div class="status" id="status"></div>
</div>

<div class="rat-link">
  ▼レースアドベンチャーゲーム制作ツール「RAT」<br>
  <a href="https://prjrat.wixsite.com/main" target="_blank">https://prjrat.wixsite.com/main</a>
</div>

<script>
const images = [null, null, null];
const uploadList = document.querySelector('.upload-list');
const outputCanvas = document.getElementById('outputCanvas');
const outputCtx = outputCanvas.getContext('2d');

for (let i = 0; i < images.length; i++) setupSlot(i);

document.getElementById('btnAddSlot').addEventListener('click', addSlot);
document.getElementById('btnRemoveSlot').addEventListener('click', removeSlot);
updateSlotButtons();

function setupSlot(i) {
  const zone = document.getElementById(`zone${i}`);
  const fileInput = document.getElementById(`file${i}`);
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0], i);
    e.target.value = '';
  });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('dragover'); });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0], i);
  });
}

function addSlot() {
  const i = images.length;
  images.push(null);

  const zone = document.createElement('div');
  zone.className = 'drop-zone';
  zone.id = `zone${i}`;
  zone.innerHTML = `
    <canvas class="prev-canvas" id="prev${i}" width="140" height="60"></canvas>
    <div class="zone-info">
      <div class="slot-name">${i + 1}枚目</div>
      <div class="slot-desc">前の画像の直下に配置</div>
      <div class="filename" id="name${i}">クリック または ドロップ</div>
    </div>
    <input type="file" id="file${i}" accept=".bmp,image/*" style="display:none">
    <label class="zone-click" for="file${i}"></label>
  `;
  uploadList.appendChild(zone);
  setupSlot(i);
  updateConvertButton();
  updateSlotButtons();
}

function removeSlot() {
  if (images.length <= 3) return;

  const i = images.length - 1;
  document.getElementById(`zone${i}`)?.remove();
  images.pop();
  updateConvertButton();
  updateSlotButtons();
}

const scaleInput = document.getElementById('scale');
const scaleStops = [20, 30, 40]; // ×2.0, ×3.0, ×4.0
let previousScaleValue = parseInt(scaleInput.value);

scaleInput.addEventListener('input', e => {
  const requestedValue = parseInt(e.target.value);
  const stopValue = scaleStops.find(value =>
    (previousScaleValue < value && requestedValue >= value) ||
    (previousScaleValue > value && requestedValue <= value)
  );

  // 倍率の節目をまたぐ際は、いったんその倍率で止める。
  const scaleValue = stopValue ?? requestedValue;
  e.target.value = scaleValue;
  previousScaleValue = scaleValue;
  document.getElementById('scaleVal').textContent = '×' + (scaleValue / 10).toFixed(1);
});
document.getElementById('tolerance').addEventListener('input', e => {
  document.getElementById('tolVal').textContent = e.target.value;
});
document.getElementById('btnConvert').addEventListener('click', convert);
document.getElementById('btnDl').addEventListener('click', download);

function handleFile(file, idx) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      images[idx] = img;
      const pv = document.getElementById(`prev${idx}`);
      const ctx = pv.getContext('2d');
      ctx.clearRect(0, 0, pv.width, pv.height);
      const s = Math.min(pv.width / img.width, pv.height / img.height);
      const dw = img.width * s, dh = img.height * s;
      ctx.drawImage(img, (pv.width - dw) / 2, (pv.height - dh) / 2, dw, dh);
      document.getElementById(`name${idx}`).textContent = file.name;
      document.getElementById(`zone${idx}`).classList.add('loaded');
      updateConvertButton();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function updateConvertButton() {
  document.getElementById('btnConvert').disabled = !images.every(Boolean);
}

function updateSlotButtons() {
  document.getElementById('btnRemoveSlot').disabled = images.length <= 3;
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function chromaKey(img, bgRgb, tol) {
  const oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  const ctx = oc.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const id = ctx.getImageData(0, 0, img.width, img.height);
  const d = id.data;
  const [br, bg, bb] = bgRgb;
  const thresh = tol * 3;
  for (let i = 0; i < d.length; i += 4) {
    if (Math.abs(d[i]-br) + Math.abs(d[i+1]-bg) + Math.abs(d[i+2]-bb) < thresh) d[i+3] = 0;
  }
  ctx.putImageData(id, 0, 0);
  return oc;
}

function convert() {
  const bgRgb = hexToRgb(document.getElementById('bgColor').value);
  const tol   = parseInt(document.getElementById('tolerance').value);
  const scale = parseInt(document.getElementById('scale').value) / 10;

  const scaled = images.map(img => ({
    img,
    w: Math.round(img.width * scale),
    h: Math.round(img.height * scale),
  }));

  const w1 = scaled[0].w;
  const h1 = scaled[0].h;
  const rightWidth = Math.max(...scaled.slice(1).map(item => item.w), w1);
  const w = Math.max(w1 * 2, w1 + rightWidth);
  const h = h1 + scaled.slice(1).reduce((sum, item) => sum + item.h, 0);
  outputCanvas.width = w;
  outputCanvas.height = h;
  outputCtx.clearRect(0, 0, w, h);
  outputCtx.imageSmoothingEnabled = false;

  const keyed = scaled.map(item => chromaKey(item.img, bgRgb, tol));

  outputCtx.drawImage(keyed[0], 0,  0,  w1, h1);
  outputCtx.drawImage(keyed[0], w1, 0,  w1, h1);
  let y = h1;
  for (let i = 1; i < scaled.length; i++) {
    outputCtx.drawImage(keyed[i], w1, y, scaled[i].w, scaled[i].h);
    y += scaled[i].h;
  }

  document.getElementById('canvasInfo').textContent = `出力プレビュー (${w} × ${h} px)`;
  document.getElementById('btnDl').disabled = false;
  const st = document.getElementById('status');
  st.textContent = `✓ 変換完了 — ${w}×${h}px / ×${scale.toFixed(1)} / 誤差${tol}`;
  st.className = 'status ok';
}

function download() {
  const link = document.createElement('a');
  link.download = 'racer.png';
  link.href = outputCanvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
